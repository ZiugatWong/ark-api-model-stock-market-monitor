services:
  ark-api-model-stock-service:
    build: .
    image: ark-api-model-stock-service:latest
    container_name: ark-api-model-stock-service
    ports:
      - "3210:3210"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://ark-api-model-stock-redis:6379
      - WINDHUB_USER_ID=${WINDHUB_USER_ID}
      - WINDHUB_COOKIE=${WINDHUB_COOKIE}
      - WINDHUB_BASE_URL=https://windhub.cc
      - SYNC_CRON=*/5 * * * *
      - RATE_LIMIT_WINDOW_SECONDS=60
      - RATE_LIMIT_MAX=2
      - PORT=3210
      - EXPRESS_TRUST_PROXY=false
      - WINDHUB_API_FAILED_NOTIFICATION=${WINDHUB_API_FAILED_NOTIFICATION:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    depends_on:
      - ark-api-model-stock-redis
    networks:
      - ark-api-network
    restart: unless-stopped

  ark-api-model-stock-redis:
    image: redis:7-alpine
    container_name: ark-api-model-stock-redis
    volumes:
      - redis-data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - ark-api-network
    restart: unless-stopped

networks:
  ark-api-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
